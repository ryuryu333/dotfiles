version: '3'

silent: false

includes:
  winget:
    taskfile: ./config/winget/Taskfile.yml
    dir: ./config/winget

tasks:
  default:
    cmds:
      - task: switch

  switch:
    desc: Switch environment
    platforms: [linux/amd64, darwin/arm64]
    cmds:
      - cmd: nix run .#system_manager -- switch --flake .#main_wsl --sudo
        platforms: [linux/amd64]
      - cmd: sudo darwin-rebuild switch --flake .
        platforms: [darwin/arm64]

  update:
    desc: Update pkgs
    cmds:
      - cmd: nix flake update
      - cmd: brew update
        platforms: [darwin/arm64]
      - cmd: echo "Update complete, run 'task' to switch"

  gc:
    desc: Clean Nix profiles and store older than 30 days
    cmds:
      - cmd: nh clean all --keep-since 30d --keep-one

  check:
    desc: Run all check
    cmd: nix flake check --all-systems

  infra:init:
    desc: Initialize Terraform for GCP
    cmd: nix develop .#infra -c terraform -chdir=infra/gcp/projects init

  infra:fmt:
    desc: Check Terraform formatting for GCP
    cmd: nix develop .#infra -c terraform -chdir=infra/gcp/projects fmt -check

  infra:validate:
    desc: Validate Terraform configuration for GCP
    cmd: nix develop .#infra -c terraform -chdir=infra/gcp/projects validate

  infra:plan:
    desc: Plan GCP infrastructure changes
    cmd: nix develop .#infra -c terraform -chdir=infra/gcp/projects plan -var-file=projects.tfvars

  infra:apply:
    desc: Apply GCP infrastructure changes
    cmd: nix develop .#infra -c terraform -chdir=infra/gcp/projects apply -var-file=projects.tfvars

  fmt:
    desc: Format nix files
    cmds:
      - cmd: nix fmt

  tf:fmt:
    desc: Format Terraform Nickel files
    dir: infra/github
    cmd: find . -type f -name '*.ncl' -exec nickel format {} +

  tf:build:
    desc: Build Terraform JSON for GitHub
    dir: infra/github
    cmd: nickel export --format json --output terraform/main.tf.json src/main.ncl

  first_switch:
    desc: First time setup for home-manager and nix-darwin (only macOS)
    platforms: [linux/amd64, darwin/arm64]
    cmds:
      - cmd: nix run .#system_manager -- switch --flake . --sudo
        platforms: [linux/amd64]
      - cmd: sudo nix run nix-darwin/master#darwin-rebuild -- switch --flake .
        platforms: [darwin/arm64]
